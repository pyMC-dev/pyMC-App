name: Bug Report
description: Report a bug or unexpected behaviour in the pyMC Flutter client
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as possible to help us reproduce and fix the issue quickly.

  # ── App & Platform ────────────────────────────────────────────────────────

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Which platform(s) are you seeing this on?
      multiple: true
      options:
        - Android
        - iOS
        - macOS
        - Linux (x86_64)
        - Linux (arm64)
        - Windows
    validations:
      required: true

  - type: input
    id: app_version
    attributes:
      label: App version
      description: Found in the app under Settings → About, or the build filename.
      placeholder: "e.g. 1.4.2+47"
    validations:
      required: true

  - type: input
    id: os_version
    attributes:
      label: OS version
      placeholder: "e.g. Android 14 / iOS 17.4 / macOS 15.3 / Ubuntu 24.04 / Windows 11 24H2"
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device / hardware
      placeholder: "e.g. Pixel 8 Pro / iPhone 15 / MacBook Pro M3 / Raspberry Pi 5"
    validations:
      required: false

  # ── Connection & Radio ────────────────────────────────────────────────────

  - type: dropdown
    id: connection_type
    attributes:
      label: Connection type
      description: How is the app connected to the gateway/repeater?
      options:
        - BLE (Bluetooth Low Energy)
        - TCP (Wi-Fi / LAN)
        - TCP (Internet / remote)
        - Not connected / offline
        - Not applicable
    validations:
      required: true

  - type: input
    id: gateway_hardware
    attributes:
      label: Gateway / repeater hardware
      description: The radio hardware the app is talking to (if relevant).
      placeholder: "e.g. Waveshare SX1262 HAT, T-Beam, uConsole, RP2040 + SX1262"
    validations:
      required: false

  # ── Bug Details ───────────────────────────────────────────────────────────

  - type: dropdown
    id: area
    attributes:
      label: Feature area
      description: Which part of the app is affected?
      multiple: true
      options:
        - Direct Messaging (DM)
        - Channel Messaging
        - Contacts / Node Directory
        - Map / Location
        - Wardrive
        - Antenna / Line-of-Sight tools
        - RF Packet Log
        - Raw Packet Builder
        - Repeater CLI
        - Radio Hardware Settings
        - Notifications
        - BLE connectivity
        - TCP connectivity
        - Authentication / Transport Keys
        - System Tray (desktop)
        - Background Fetch
        - Settings / Profile
        - UI / Theme
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Bug description
      description: A clear and concise description of what the bug is.
      placeholder: "When I open a channel with emoji in the sender name, the app crashes with..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Step-by-step instructions to reliably trigger the bug.
      placeholder: |
        1. Open the app and connect via BLE
        2. Navigate to Channels
        3. Open a channel that has messages from a contact whose name contains an emoji
        4. Scroll down — app crashes
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: What actually happened? Include any error messages shown in the UI.
    validations:
      required: true

  # ── Logs & Diagnostics ────────────────────────────────────────────────────



  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or screen recordings
      description: Drag and drop images or videos here if they help illustrate the issue.
    validations:
      required: false

  # ── Additional Context ────────────────────────────────────────────────────

  - type: dropdown
    id: regression
    attributes:
      label: Regression?
      description: Did this work in a previous version?
      options:
        - "Yes — it worked before"
        - "No — never worked as far as I know"
        - "Not sure"
    validations:
      required: true

  - type: input
    id: last_good_version
    attributes:
      label: Last working version (if regression)
      placeholder: "e.g. 1.3.9+44"
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Radio presets, network topology, node counts, config snippets — anything that might be relevant.
    validations:
      required: false
